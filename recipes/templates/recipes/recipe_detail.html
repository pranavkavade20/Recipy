{% extends "base.html" %}
{% block title %}Recipe Detail | Recipy{% endblock %}

{% block content %}
<div class="pb-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">

        <div id="recipe" class="animate-fade-in">
            <div class="flex flex-col justify-center items-center min-h-[50vh] space-y-4">
                <div class="w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
                <p class="text-xl font-medium text-slate-500 dark:text-slate-400 animate-pulse">Preparing ingredients...</p>
            </div>
        </div>

     <div id="video-section" class="mt-16 md:mt-24 hidden space-y-16">
            
            <div id="long-videos-container" class="hidden">
                <div class="flex items-center gap-3 mb-8 border-b border-slate-200 dark:border-white/10 pb-4">
                    <div class="p-2 bg-red-100 dark:bg-red-900/30 rounded-xl text-red-600">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    </div>
                    <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">Creator Videos</h2>
                </div>
                <div id="long-videos-grid" class="flex flex-col gap-16"></div>
            </div>

            <div id="shorts-container" class="hidden">
                <div class="flex items-center gap-3 mb-8 border-b border-slate-200 dark:border-white/10 pb-4">
                    <div class="p-2 bg-primary/20 rounded-xl text-primary">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <div>
                        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">Quick Tips & Shorts</h2>
                    </div>
                </div>
                <div id="shorts-grid" class="flex overflow-x-auto pb-6 gap-6 md:grid md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 snap-x scroll-smooth no-scrollbar"></div>
            </div>

            <div id="youtube-recommended-container" class="hidden">
                <div class="flex items-center gap-3 mb-8 border-b border-slate-200 dark:border-white/10 pb-4">
                    <div class="p-2 bg-red-100 dark:bg-red-900/30 rounded-xl text-red-600">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    </div>
                    <div>
                        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">YouTube Recommended</h2>
                    </div>
                </div>
                <div id="youtube-recommended-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>

        <div class="mt-16 md:mt-24">
            <div class="flex items-center justify-between mb-8 border-b border-slate-200 dark:border-white/10 pb-4">
                <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">
                    You Might Also <span class="text-primary">Love</span>
                </h2>
            </div>
            <div id="similar-recipes" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script>
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const isSuccess = type === 'success';
            
            const toast = document.createElement('div');
            toast.className = `pointer-events-auto flex items-center w-full max-w-sm p-4 rounded-2xl shadow-2xl transform transition-all duration-300 translate-y-10 opacity-0 border bg-white dark:bg-gray-800 text-slate-800 dark:text-white border-slate-200 dark:border-white/10`;
            
            const icon = isSuccess 
                ? `<div class="flex-shrink-0 w-10 h-10 bg-success/20 rounded-full flex items-center justify-center text-success"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></div>`
                : `<div class="flex-shrink-0 w-10 h-10 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center text-red-500"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></div>`;

            toast.innerHTML = `${icon}<div class="ml-3 text-sm font-medium flex-1">${message}</div>`;
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function getCSRFToken() {
            const cookieValue = document.cookie.match(/csrftoken=([^ ;]+)/);
            return cookieValue ? cookieValue[1] : "";
        }
        
        // All URL parsing is done server-side. The view now returns:
        //   embed_url  — ready-to-use for <iframe src> or <video src>
        //   watch_url  — YouTube watch link (null for file/external types)
        //   type       — 'youtube' | 'youtube_short' | 'file' | 'external'

    async function fetchRecipeVideos(recipeId) {
        const section        = document.getElementById('video-section');
        const longContainer  = document.getElementById('long-videos-container');
        const shortContainer = document.getElementById('shorts-container');
        const ytContainer    = document.getElementById('youtube-recommended-container');
        const longGrid       = document.getElementById('long-videos-grid');
        const shortGrid      = document.getElementById('shorts-grid');
        const ytGrid         = document.getElementById('youtube-recommended-grid');

        try {
            const response = await fetch(`/videos/${recipeId}/`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();

            if ((!data.videos || data.videos.length === 0) && (!data.youtube_videos || data.youtube_videos.length === 0)) return;

            let longVideosHTML = '';
            let shortsHTML = '';
            let ytHTML = '';
            let hasLong = false;
            let hasShort = false;
            let hasYt = false;

            if (data.videos && data.videos.length > 0) {
                data.videos.forEach(video => {
                const title      = video.title     || 'Recipe Video';
                const embedUrl   = video.embed_url || '';
                const watchUrl   = video.watch_url || null;
                const videoType  = video.type      || 'youtube';

                if (!embedUrl) return; // Skip if no valid URL

                if (videoType === 'youtube_short') {
                    // ── Short video (9:16 portrait layout) ──
                    hasShort = true;
                    shortsHTML += `
                        <div class="snap-center shrink-0 flex flex-col gap-3" style="width:240px;">
                            <div class="bg-black rounded-3xl overflow-hidden shadow-xl border-4 border-gray-800 relative" style="aspect-ratio:9/16;">
                                <iframe
                                    class="absolute inset-0 w-full h-full"
                                    src="${embedUrl}"
                                    title="${title}"
                                    frameborder="0"
                                    referrerpolicy="strict-origin-when-cross-origin"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    allowfullscreen
                                ></iframe>
                            </div>
                            ${watchUrl ? `<a href="${watchUrl}" target="_blank" rel="noopener noreferrer"
                                class="w-full py-2 bg-white dark:bg-gray-800 rounded-xl text-xs font-bold
                                       text-gray-600 dark:text-gray-300 hover:bg-red-50 hover:text-red-600
                                       transition-colors flex items-center justify-center gap-1 shadow-sm
                                       border border-gray-100 dark:border-gray-700">
                                Open in YouTube
                            </a>` : ''}
                        </div>`;

                } else if (videoType === 'file') {
                    // ── Raw video file uploaded by user — use <video> tag ──
                    hasLong = true;
                    longVideosHTML += `
                        <div class="flex flex-col gap-4 w-full">
                            <p class="text-sm font-bold text-slate-700 dark:text-slate-200">${title}</p>
                            <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-gray-200
                                        dark:border-gray-800 w-full" style="aspect-ratio:16/9;">
                                <video
                                    class="w-full h-full object-contain"
                                    controls
                                    preload="metadata"
                                    src="${embedUrl}"
                                    title="${title}"
                                >
                                    Your browser does not support the video tag.
                                </video>
                            </div>
                        </div>`;

                } else {
                    // ── YouTube (standard) or external embeddable URL ──
                    hasLong = true;
                    longVideosHTML += `
                        <div class="flex flex-col gap-4 w-full">
                            <p class="text-sm font-bold text-slate-700 dark:text-slate-200">${title}</p>
                            <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-gray-200
                                        dark:border-gray-800 relative w-full" style="aspect-ratio:16/9;">
                                <iframe
                                    class="absolute inset-0 w-full h-full"
                                    src="${embedUrl}"
                                    title="${title}"
                                    frameborder="0"
                                    referrerpolicy="strict-origin-when-cross-origin"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    allowfullscreen
                                ></iframe>
                            </div>
                            ${watchUrl ? `<a href="${watchUrl}" target="_blank" rel="noopener noreferrer"
                                class="inline-flex items-center gap-2 text-xs font-bold text-red-600
                                       hover:underline">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356
                                             2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245
                                             11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185
                                             -.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                                </svg>
                                Watch on YouTube
                            </a>` : ''}
                        </div>`;
                }
            });
            }

            if (data.youtube_videos && data.youtube_videos.length > 0) {
                data.youtube_videos.forEach(video => {
                    const title      = video.title     || 'YouTube Video';
                    const embedUrl   = video.embed_url || '';
                    const watchUrl   = video.watch_url || null;

                    if (!embedUrl) return;

                    hasYt = true;
                    ytHTML += `
                        <div class="flex flex-col gap-4 w-full">
                            <p class="text-sm font-bold text-slate-700 dark:text-slate-200 line-clamp-2" title="${title}">${title}</p>
                            <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-gray-200
                                        dark:border-gray-800 relative w-full" style="aspect-ratio:16/9;">
                                <iframe
                                    class="absolute inset-0 w-full h-full"
                                    src="${embedUrl}"
                                    title="${title}"
                                    frameborder="0"
                                    referrerpolicy="strict-origin-when-cross-origin"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    allowfullscreen
                                ></iframe>
                            </div>
                            ${watchUrl ? `<a href="${watchUrl}" target="_blank" rel="noopener noreferrer"
                                class="inline-flex items-center gap-2 text-xs font-bold text-red-600
                                       hover:underline">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356
                                             2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245
                                             11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185
                                             -.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                                </svg>
                                Watch on YouTube
                            </a>` : ''}
                        </div>`;
                });
            }

            if (hasLong)  { longGrid.innerHTML  = longVideosHTML; longContainer.classList.remove('hidden'); }
            if (hasShort) { shortGrid.innerHTML = shortsHTML;     shortContainer.classList.remove('hidden'); }
            if (hasYt)    { ytGrid.innerHTML    = ytHTML;         ytContainer.classList.remove('hidden'); }
            
            if (hasLong || hasShort || hasYt) { section.classList.remove('hidden'); }

        } catch (error) {
            console.error('Error loading videos:', error);
        }
    }

        async function fetchRecipeData() {
            try {
                const response = await fetch('/api/recipe/{{ recipe.id }}/');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                displayRecipe(data.recipe);
                displaySimilarRecipes(data.similar_recipes);
                fetchRecipeVideos("{{ recipe.id }}"); 
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('recipe').innerHTML = `
                    <div class="text-center py-20">
                        <div class="inline-block p-4 rounded-full bg-red-50 dark:bg-red-900/20 mb-4">
                            <svg class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Failed to load recipe</h2>
                        <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition">Retry</button>
                    </div>`;
            }
        }

        function displayRecipe(recipe) {
            const recipeContainer = document.getElementById('recipe');
            const dietColor = recipe.diet && recipe.diet.includes('Non') ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300' : 'bg-success/20 text-success';
            
            // DRF Serializer renders the image field natively as the URL string
            recipeContainer.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-8 lg:gap-12 mb-12">
                    <div class="w-full lg:w-1/2 flex flex-col gap-6">
                        <div class="relative rounded-2xl sm:rounded-[2rem] overflow-hidden shadow-2xl group w-full">
                            <img 
                                src="${recipe.image}" 
                                alt="${recipe.name}" 
                                class="w-full aspect-[4/3] object-cover transform transition-transform duration-700 group-hover:scale-105" 
                            />
                            
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-60"></div>
                            <div class="absolute bottom-4 left-4 sm:bottom-6 sm:left-6 flex flex-wrap gap-2">
                                <span class="px-2 sm:px-3 py-1 rounded-lg text-[10px] sm:text-xs font-bold uppercase tracking-wider bg-white/90 backdrop-blur text-slate-900 shadow-lg">${recipe.course || 'Dish'}</span>
                                <span class="px-2 sm:px-3 py-1 rounded-lg text-[10px] sm:text-xs font-bold uppercase tracking-wider bg-primary text-white shadow-lg">${recipe.cuisine || 'Global'}</span>
                            </div>
                        </div>
                        
                        <div>
                            <button onclick="saveFavoriteRecipe(${recipe.id})" class="w-full relative group overflow-hidden rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-lg py-4 px-8 shadow-xl transition-all hover:-translate-y-1 focus:ring-4 focus:ring-primary/50">
                                <span class="relative z-10 flex items-center justify-center gap-2 group-hover:scale-105 transition-transform">
                                    <svg class="w-6 h-6 text-primary group-hover:animate-ping" fill="currentColor" viewBox="0 0 24 24"><path d="M11.645 20.91l-.007-.003-.022-.012-2.73-1.636-1.125-.664-.55-.324C7.027 18.067 5.757 17.51 4.545 16.5C3.332 15.49 2.5 14.288 2.5 13.064c0-2.915 2.138-4.992 4.136-6.191C8.272 5.568 10.15 5.006 12 5.006c1.85 0 3.728.562 5.364 1.867 2 1.199 4.136 3.276 4.136 6.191 0 1.224-.833 2.424-2.045 3.435-1.212 1.01-2.482 1.567-3.791 2.378l-.55.324-1.125.664-2.73 1.636-.022.012-.007.003-.002.001-.002.001Z" /></svg>
                                    Save to Favorites
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="w-full lg:w-1/2 flex flex-col justify-center">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold uppercase tracking-wide ${dietColor}">${recipe.diet || 'Standard'}</span>
                        </div>
                        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-4 sm:mb-6 leading-tight">${recipe.name}</h1>
                        <p class="text-base sm:text-lg text-slate-600 dark:text-slate-300 leading-relaxed mb-6 sm:mb-8 border-l-4 border-primary pl-4 bg-primary/10 py-3 rounded-r-lg shadow-sm">${recipe.description}</p>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white dark:bg-white/5 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-white/10 flex items-center gap-3 transition-transform hover:-translate-y-1">
                                <div class="w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-blue-500">
                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase">Prep Time</p>
                                    <p class="font-bold text-slate-900 dark:text-white">${recipe.prep_time || '30 mins'}</p>
                                </div>
                            </div>
                            <div class="bg-white dark:bg-white/5 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-white/10 flex items-center gap-3 transition-transform hover:-translate-y-1">
                                <div class="w-10 h-10 rounded-full bg-success/20 flex items-center justify-center text-success">
                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase">Servings</p>
                                    <p class="font-bold text-slate-900 dark:text-white">4 People</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 lg:gap-12">
                    <div class="lg:col-span-2">
                        <div class="dark:bg-bg-slate-900 rounded-2xl sm:rounded-[2rem] shadow-sm border border-slate-100 dark:border-white/10 p-6 sm:p-8 md:p-10 mb-8">
                            <h3 class="text-xl sm:text-2xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-3">
                                <span class="flex items-center justify-center w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-primary/20 text-primary">
                                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
                                </span>
                                Instructions
                            </h3>
                            <div class="prose prose-sm sm:prose-lg dark:prose-invert max-w-none text-slate-600 dark:text-slate-300 leading-relaxed whitespace-pre-line">${recipe.instructions || "Instructions not added yet."}</div>
                        </div>
                    </div>
                </div>`;
        }

        function displaySimilarRecipes(recipes) {
            const container = document.getElementById('similar-recipes');
            if(!recipes || recipes.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500">No similar recipes found.</p>';
                return;
            }
            container.innerHTML = recipes.map(recipe => {
                let badgeClass = "bg-primary/90";
                if (recipe.diet && recipe.diet.includes("Non")) badgeClass = "bg-red-500/90";
                else if (recipe.diet && recipe.diet.includes("Veg")) badgeClass = "bg-success/90 text-white";
                return `
                <a href="/detail/${recipe.id}" class="block group h-full">
                    <div class="dark:bg-bg-slate-900 rounded-[2rem] border border-slate-100 dark:border-white/5 overflow-hidden hover:-translate-y-2 hover:shadow-[0_20px_40px_-20px_rgba(249,115,22,0.4)] transition-all duration-500 h-full flex flex-col">
                        <div class="relative h-72 overflow-hidden">
                            <img src="${recipe.image}" alt="${recipe.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy" />
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-70 group-hover:opacity-90">
                            </div>
                            <span class="absolute top-4 left-4 px-3 py-1 rounded-full text-[10px] uppercase tracking-widest font-black backdrop-blur-md shadow-sm border border-white/20 text-white ${badgeClass}">${recipe.diet || 'Recipe'}</span></div>
                            <div class="p-6 flex flex-col flex-grow relative z-10">
                                <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2 leading-snug group-hover:text-primary transition-colors line-clamp-2">${recipe.name}</h3>
                                <div class="mt-auto pt-4 border-t border-slate-100 dark:border-white/5 flex items-center justify-between">
                                    <div class="flex items-center text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                        <svg class="w-4 h-4 mr-1.5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                                        ${recipe.cuisine || 'Global'}</div><span class="font-bold text-xs uppercase text-accent bg-accent/10 px-3 py-1 rounded-full">${recipe.course || 'Dish'}</span>
                                    </div>
                                </div>
                    </div>
                </a>`;
            }).join('');
        }

        async function saveFavoriteRecipe(recipeId) {
            try {
                const response = await fetch('/save-favorite/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ recipe_id: recipeId })
                });
                const data = await response.json();
                if (response.ok) showToast(data.message, 'success');
                else showToast(data.error || "Failed to save", 'error');
            } catch (error) {
                showToast("Connection error.", 'error');
            }
        }

        fetchRecipeData();
    </script>
</div>
{% endblock %}
